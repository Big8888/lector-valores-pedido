<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 12px;
        color: #222;
      }

      h2 {
        margin: 0 0 6px;
      }

      .subtitulo {
        margin: 0 0 14px;
        color: #666;
        font-size: 13px;
      }

      .box {
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .resumen {
        display: grid;
        gap: 6px;
      }

      .totales {
        font-size: 17px;
        font-weight: bold;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        font-size: 16px;
      }

      .resultado {
        margin-top: 10px;
        font-size: 20px;
        font-weight: bold;
        color: #0b5394;
      }

      .listaPedidos {
        max-height: 300px;
        overflow-y: auto;
      }

      .pedidoItem {
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
      }

      .pedidoTitulo {
        font-size: 16px;
        font-weight: bold;
      }

      .pedidoSub {
        margin-top: 6px;
        color: #555;
        font-size: 13px;
      }

      .badge {
        display: inline-block;
        margin-top: 6px;
        padding: 3px 8px;
        border-radius: 999px;
        font-size: 12px;
        font-weight: bold;
      }

      .badgeCobrado {
        background: #d9ead3;
        color: #1f4d1f;
      }

      .badgePendiente {
        background: #fce5cd;
        color: #8a4b08;
      }

      .loading,
      .error {
        padding: 18px 10px;
        text-align: center;
        font-size: 14px;
      }

      .loading {
        color: #555;
      }

      .error {
        color: #9c0006;
      }

      .acciones {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
        width: 100%;
      }

      button:disabled,
      input:disabled {
        opacity: 0.6;
        cursor: default;
      }

      @media (min-width: 560px) {
        body {
          padding: 16px;
        }

        .acciones {
          flex-direction: row;
          gap: 10px;
        }

        button {
          flex: 1;
          width: auto;
        }
      }
    </style>
  </head>
  <body>
    <h2>Cobro de pedidos</h2>
    <p class="subtitulo" id="subtitulo">Cargando pedidos marcados en A...</p>

    <div class="box resumen">
      <div class="totales">Efectivo a cobrar: $<span id="totalEfectivoCobro">0</span></div>
      <div>Tarjeta: $<span id="totalTarjeta">0</span></div>
      <div>Efectivo: $<span id="totalEfectivo">0</span></div>
      <div>Transferencia: $<span id="totalTransferencia">0</span></div>
      <div>Total seleccionado: $<span id="totalGeneral">0</span></div>
    </div>

    <div class="box">
      <label for="montoPago">Con cuanto pagan?</label>
      <input type="number" id="montoPago" placeholder="Ej: 2000" oninput="calcularVuelto()" disabled>
      <div class="resultado" id="vuelto">Vuelto: $0</div>
    </div>

    <div class="box listaPedidos" id="listaPedidos">
      <div class="loading">Cargando pedidos...</div>
    </div>

    <div class="acciones">
      <button id="btnConfirmar" onclick="confirmar()" disabled>Confirmar cobro</button>
      <button id="btnQuitar" onclick="quitar()" disabled>Quitar cobro</button>
      <button id="btnCancelar" onclick="google.script.host.close()">Cancelar</button>
    </div>

    <script>
      const sheetName = <?!= JSON.stringify(sheetName) ?>;
      let items = [];
      let filas = [];
      let totalEfectivo = 0;

      function escapeHtml(value) {
        return String(value || '')
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setAccionesHabilitadas(enabled) {
        document.getElementById('btnConfirmar').disabled = !enabled;
        document.getElementById('btnQuitar').disabled = !enabled;
        document.getElementById('montoPago').disabled = !enabled;
      }

      function actualizarResumen(data) {
        document.getElementById('totalTarjeta').textContent = data.totalTarjeta || 0;
        document.getElementById('totalEfectivo').textContent = data.totalEfectivo || 0;
        document.getElementById('totalTransferencia').textContent = data.totalTransferencia || 0;
        document.getElementById('totalGeneral').textContent = data.totalGeneral || 0;
        document.getElementById('totalEfectivoCobro').textContent = data.totalEfectivo || 0;
      }

      function renderPedidos() {
        const lista = document.getElementById('listaPedidos');

        if (items.length === 0) {
          lista.innerHTML = '<div class="error">No hay pedidos marcados en A.</div>';
          return;
        }

        lista.innerHTML = items.map(function(item) {
          return ''
            + '<div class="pedidoItem">'
            + '  <div class="pedidoTitulo">Pedido ' + escapeHtml(item.numeroPedidoInterno || item.fila) + ' - $' + escapeHtml(item.totalFila) + '</div>'
            + '  <div class="pedidoSub">'
            + '    Estado: ' + escapeHtml(item.estadoPago || 'SIN ESTADO')
            + ' | Tarjeta $' + escapeHtml(item.tarjeta)
            + ' | Efectivo $' + escapeHtml(item.efectivo)
            + ' | Transferencia $' + escapeHtml(item.transferencia)
            + '  </div>'
            + '  <div class="badge ' + (item.cobrado ? 'badgeCobrado' : 'badgePendiente') + '">'
            +       (item.cobrado ? 'COBRADO' : 'PENDIENTE')
            + '  </div>'
            + '</div>';
        }).join('');
      }

      function mostrarError(message) {
        document.getElementById('subtitulo').textContent = message;
        document.getElementById('listaPedidos').innerHTML = '<div class="error">' + escapeHtml(message) + '</div>';
        document.getElementById('btnCancelar').textContent = 'Cerrar';
        setAccionesHabilitadas(false);
      }

      function cargarDatos() {
        setAccionesHabilitadas(false);

        google.script.run
          .withSuccessHandler(function(data) {
            items = Array.isArray(data.items) ? data.items : [];
            filas = items.map(function(item) { return item.fila; });
            totalEfectivo = Number(data.totalEfectivo) || 0;

            document.getElementById('subtitulo').textContent = 'Estos son los pedidos marcados en A en la hoja actual.';
            actualizarResumen(data);
            renderPedidos();
            setAccionesHabilitadas(items.length > 0);
            calcularVuelto();

            if (items.length > 0) {
              document.getElementById('montoPago').focus();
            }
          })
          .withFailureHandler(function(error) {
            mostrarError(error && error.message ? error.message : 'No se pudieron cargar los pedidos seleccionados.');
          })
          .obtenerDatosCobroModal(sheetName);
      }

      function calcularVuelto() {
        const montoPago = Number(document.getElementById('montoPago').value) || 0;
        const vuelto = montoPago - totalEfectivo;
        document.getElementById('vuelto').textContent = 'Vuelto: $' + vuelto;
      }

      function confirmar() {
        const montoPago = Number(document.getElementById('montoPago').value) || 0;

        if (filas.length === 0) {
          alert('No hay pedidos marcados en A para cobrar.');
          return;
        }

        if (totalEfectivo > 0 && montoPago < totalEfectivo) {
          alert('El monto ingresado es menor que el efectivo a cobrar.');
          return;
        }

        google.script.run
          .withSuccessHandler(function() {
            google.script.host.close();
          })
          .withFailureHandler(function(error) {
            alert(error && error.message ? error.message : 'No se pudo registrar el cobro.');
          })
          .confirmarCobro({
            sheetName: sheetName,
            filas: filas,
            montoPago: montoPago,
            totalEfectivo: totalEfectivo,
            vuelto: montoPago - totalEfectivo
          });
      }

      function quitar() {
        if (filas.length === 0) {
          alert('No hay pedidos marcados en A para quitar.');
          return;
        }

        google.script.run
          .withSuccessHandler(function() {
            google.script.host.close();
          })
          .withFailureHandler(function(error) {
            alert(error && error.message ? error.message : 'No se pudo quitar el cobro.');
          })
          .quitarCobro({
            sheetName: sheetName,
            filas: filas
          });
      }

      document.addEventListener('DOMContentLoaded', cargarDatos);
    </script>
  </body>
</html>
