<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
        color: #222;
      }

      h2 {
        margin: 0 0 6px;
      }

      .subtitulo {
        margin: 0 0 14px;
        color: #666;
        font-size: 13px;
      }

      .box {
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .resumen {
        display: grid;
        gap: 6px;
      }

      .totales {
        font-size: 17px;
        font-weight: bold;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        font-size: 16px;
      }

      .resultado {
        margin-top: 10px;
        font-size: 20px;
        font-weight: bold;
        color: #0b5394;
      }

      .listaPedidos {
        max-height: 320px;
        overflow-y: auto;
      }

      .pedidoItem {
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
      }

      .pedidoTitulo {
        font-size: 16px;
        font-weight: bold;
      }

      .pedidoSub {
        margin-top: 6px;
        color: #555;
        font-size: 13px;
      }

      .acciones {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        flex: 1;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>Cobro de pedidos</h2>
    <p class="subtitulo">Estos son los pedidos marcados en A en la hoja actual.</p>

    <div class="box resumen">
      <div class="totales">Efectivo a cobrar: $<span id="totalEfectivoCobro"><?= totalEfectivo ?></span></div>
      <div>Tarjeta: $<span id="totalTarjeta"><?= totalTarjeta ?></span></div>
      <div>Efectivo: $<span id="totalEfectivo"><?= totalEfectivo ?></span></div>
      <div>Transferencia: $<span id="totalTransferencia"><?= totalTransferencia ?></span></div>
      <div>Total seleccionado: $<span id="totalGeneral"><?= totalGeneral ?></span></div>
    </div>

    <div class="box">
      <label for="montoPago">Con cuanto pagan?</label>
      <input type="number" id="montoPago" placeholder="Ej: 2000" oninput="calcularVuelto()">
      <div class="resultado" id="vuelto">Vuelto: $0</div>
    </div>

    <div class="box listaPedidos">
      <? for (var i = 0; i < items.length; i++) { ?>
        <div class="pedidoItem">
          <div class="pedidoTitulo">Pedido <?= items[i].numeroPedidoInterno || items[i].fila ?> - $<?= items[i].totalFila ?></div>
          <div class="pedidoSub">
            Estado: <?= items[i].estadoPago || 'SIN ESTADO' ?> | Tarjeta $<?= items[i].tarjeta ?> | Efectivo $<?= items[i].efectivo ?> | Transferencia $<?= items[i].transferencia ?>
          </div>
        </div>
      <? } ?>
    </div>

    <div class="acciones">
      <button onclick="confirmar()">Confirmar cobro</button>
      <button onclick="google.script.host.close()">Cancelar</button>
    </div>

    <script>
      const items = <?!= JSON.stringify(items) ?>;
      const sheetName = <?!= JSON.stringify(sheetName) ?>;
      const filas = items.map((item) => item.fila);
      const totalEfectivo = Number(<?= totalEfectivo ?>) || 0;

      function calcularVuelto() {
        const montoPago = Number(document.getElementById('montoPago').value) || 0;
        const vuelto = montoPago - totalEfectivo;
        document.getElementById('vuelto').textContent = 'Vuelto: $' + vuelto;
      }

      function confirmar() {
        const montoPago = Number(document.getElementById('montoPago').value) || 0;

        if (filas.length === 0) {
          alert('No hay pedidos marcados en A para cobrar.');
          return;
        }

        if (totalEfectivo > 0 && montoPago < totalEfectivo) {
          alert('El monto ingresado es menor que el efectivo a cobrar.');
          return;
        }

        google.script.run
          .withSuccessHandler(function(res) {
            alert(res.mensaje);
            google.script.host.close();
          })
          .withFailureHandler(function(error) {
            alert(error && error.message ? error.message : 'No se pudo registrar el cobro.');
          })
          .confirmarCobro({
            sheetName: sheetName,
            filas: filas,
            montoPago: montoPago,
            totalEfectivo: totalEfectivo,
            vuelto: montoPago - totalEfectivo
          });
      }

      calcularVuelto();
    </script>
  </body>
</html>
