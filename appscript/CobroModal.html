<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 16px;
      }

      h2 {
        margin: 0 0 12px;
      }

      .box {
        border: 1px solid #d9d9d9;
        border-radius: 10px;
        padding: 12px;
        margin-bottom: 12px;
      }

      .totales {
        font-size: 17px;
        font-weight: bold;
        margin-top: 4px;
      }

      label {
        display: block;
        font-weight: bold;
        margin-bottom: 6px;
      }

      input {
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
        font-size: 16px;
      }

      input[type="checkbox"] {
        width: auto;
        padding: 0;
        transform: scale(1.2);
        accent-color: #34a853;
      }

      .resultado {
        margin-top: 10px;
        font-size: 20px;
        font-weight: bold;
        color: #0b5394;
      }

      .listaPedidos {
        max-height: 280px;
        overflow-y: auto;
      }

      .pedidoItem {
        border: 1px solid #e5e5e5;
        border-radius: 10px;
        padding: 10px;
        margin-bottom: 8px;
      }

      .pedidoLabel {
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
      }

      .pedidoTitulo {
        font-size: 16px;
        font-weight: bold;
      }

      .pedidoSub {
        margin-top: 6px;
        margin-left: 30px;
        color: #555;
        font-size: 13px;
      }

      .acciones {
        display: flex;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        flex: 1;
        padding: 10px 14px;
        font-size: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <h2>Cobro de pedidos seleccionados</h2>

    <div class="box">
      <div class="totales">Efectivo a cobrar: $<span id="totalEfectivoCobro">0</span></div>
      <div>Tarjeta: $<span id="totalTarjeta">0</span></div>
      <div>Efectivo: $<span id="totalEfectivo">0</span></div>
      <div>Transferencia: $<span id="totalTransferencia">0</span></div>
      <div>Total seleccionado: $<span id="totalGeneral">0</span></div>
    </div>

    <div class="box">
      <label for="montoPago">¿Con cuánto pagan?</label>
      <input type="number" id="montoPago" placeholder="Ej: 2000" oninput="calcularVuelto()">
      <div class="resultado" id="vuelto">Vuelto: $0</div>
    </div>

    <div class="box listaPedidos">
      <? for (var i = 0; i < items.length; i++) { ?>
        <div class="pedidoItem">
          <label class="pedidoLabel">
            <input type="checkbox" class="selectorPedido" data-index="<?= i ?>" oninput="recalcularSeleccion()">
            <span class="pedidoTitulo">Pedido <?= items[i].numeroPedidoInterno || items[i].fila ?> - $<?= items[i].totalFila ?></span>
          </label>
          <div class="pedidoSub">
            Estado: <?= items[i].estadoPago || 'SIN ESTADO' ?> | Tarjeta $<?= items[i].tarjeta ?> | Efectivo $<?= items[i].efectivo ?> | Transferencia $<?= items[i].transferencia ?>
          </div>
        </div>
      <? } ?>
    </div>

    <div class="acciones">
      <button onclick="confirmar()">OK</button>
      <button onclick="google.script.host.close()">Cancelar</button>
    </div>

    <script>
      const items = <?!= JSON.stringify(items) ?>;
      const sheetName = <?!= JSON.stringify(sheetName) ?>;
      let totalEfectivo = 0;

      function calcularVuelto() {
        const montoPago = Number(document.getElementById('montoPago').value) || 0;
        const vuelto = montoPago - totalEfectivo;
        document.getElementById('vuelto').textContent = 'Vuelto: $' + vuelto;
      }

      function obtenerSeleccionados() {
        const checks = Array.from(document.querySelectorAll('.selectorPedido'));
        return checks
          .filter((check) => check.checked)
          .map((check) => items[Number(check.dataset.index)]);
      }

      function recalcularSeleccion() {
        const seleccionados = obtenerSeleccionados();

        const totalTarjeta = seleccionados.reduce((sum, item) => sum + (Number(item.tarjeta) || 0), 0);
        totalEfectivo = seleccionados.reduce((sum, item) => sum + (Number(item.efectivo) || 0), 0);
        const totalTransferencia = seleccionados.reduce((sum, item) => sum + (Number(item.transferencia) || 0), 0);
        const totalGeneral = seleccionados.reduce((sum, item) => sum + (Number(item.totalFila) || 0), 0);

        document.getElementById('totalTarjeta').textContent = totalTarjeta;
        document.getElementById('totalEfectivo').textContent = totalEfectivo;
        document.getElementById('totalTransferencia').textContent = totalTransferencia;
        document.getElementById('totalEfectivoCobro').textContent = totalEfectivo;
        document.getElementById('totalGeneral').textContent = totalGeneral;

        calcularVuelto();
      }

      function confirmar() {
        const seleccionados = obtenerSeleccionados();
        const filas = seleccionados.map(item => item.fila);
        const montoPago = Number(document.getElementById('montoPago').value) || 0;

        if (filas.length === 0) {
          alert('Tildá al menos un pedido para cobrar.');
          return;
        }

        if (totalEfectivo > 0 && montoPago < totalEfectivo) {
          alert('El monto ingresado es menor que el efectivo a cobrar.');
          return;
        }

        google.script.run
          .withSuccessHandler(function(res) {
            alert(res.mensaje);
            google.script.host.close();
          })
          .withFailureHandler(function(error) {
            alert(error && error.message ? error.message : 'No se pudo registrar el cobro.');
          })
          .confirmarCobro({
            sheetName: sheetName,
            filas: filas,
            montoPago: montoPago,
            totalEfectivo: totalEfectivo,
            vuelto: montoPago - totalEfectivo
          });
      }

      recalcularSeleccion();
    </script>
  </body>
</html>
